        function renderArtistPage(artist){ let data = appState.artistDetailsData[artist]; if(!data){ appContainer.innerHTML = `<div class="max-w-4xl mx-auto text-center p-6"><button id="backBtn" class="back-button mb-4 text-accent"><i class="fas fa-arrow-left mr-2"></i> Back</button><i class="fas fa-user-circle text-5xl text-gray-600 mb-4"></i><h2 class="text-2xl font-bold text-white">Artist not found</h2></div>`; document.getElementById('backBtn')?.addEventListener('click',()=>{ if(appState.lastChart) showChart(appState.lastChart, appState.lastChartDate); else navigateBack(); }); return; } getSpotifyImage(artist,'artist').then(img=>{ let sections = ['Top 50 Artists','Hot 100 Songs','Radio Songs','Top 100 Albums','Top Streaming Albums','Top Album Sales','Streaming Songs','Digital Songs Sales','Top 40 Radio'].map(name=>{ let cd = data[name]; if(!cd||cd.count===0) return ''; let isArtist = name==='Top 50 Artists'; let isRadioTop40 = name==='Top 40 Radio'; return `<div class="artist-list-card mb-6"><div class="artist-list-header"><h3 class="font-bold text-gray-800">${name}</h3><p class="text-xs text-gray-500">${isArtist?`Peak #${cd.entries[0]?.peak||0} / ${cd.entries[0]?.weeks||0} Weeks`:`${cd.count} Entries / ${cd.numberOnes} #1's / ${cd.topTens} Top 10's`}</p></div>${!isArtist?`<div class="divide-y">${cd.entries.slice(0,20).map(e=>`<div class="artist-list-item"><div><span class="font-medium text-gray-800">${e.item}</span>${e.unitsSold?`<span class="text-xs text-gray-500 ml-2">${e.unitsSold}</span>`:''}${e.totalUnits?`<span class="units-badge text-xs">${e.totalUnits} total</span>`:''}</div><div class="flex gap-3"><span class="text-xs text-gray-500">Peak #${e.peak}</span><span class="text-xs text-gray-500">${e.weeks} wks</span></div></div>`).join('')}${cd.entries.length>20?`<div class="text-center py-2 text-xs text-gray-400">... and ${cd.entries.length-20} more</div>`:''}</div>`:''}</div>`; }).join(''); appContainer.innerHTML = `<div class="max-w-4xl mx-auto"><button id="backBtn" class="back-button mb-4 text-accent"><i class="fas fa-arrow-left mr-2"></i> Back</button>${img?`<img src="${img}" class="artist-header-image">`:`<div class="artist-header-image placeholder-art flex items-center justify-center"><i class="fas fa-user text-4xl text-gray-500"></i></div>`}<h1 class="artist-name-large">${artist}</h1><p class="text-gray-400 text-sm mb-6">Detailed Chart History</p><div>${sections}</div></div>`; document.getElementById('backBtn')?.addEventListener('click',()=>{ if(appState.lastChart) showChart(appState.lastChart, appState.lastChartDate); else navigateBack(); }); setupBackToTop(); }); }
        function showAllArtists(){ appState.currentView='allArtists'; let artists = appState.allArtistsList; if (!artists.length) { appContainer.innerHTML = `<div class="max-w-6xl mx-auto"><button id="backBtn" class="back-button mb-4 text-accent"><i class="fas fa-arrow-left mr-2"></i> Back to Home</button><div class="text-center py-8"><div class="loader mx-auto mb-4"></div><p class="text-gray-400">Loading artists data...</p></div></div>`; document.getElementById('backBtn')?.addEventListener('click',navigateBack); return; } appContainer.innerHTML = `<div class="max-w-6xl mx-auto"><button id="backBtn" class="back-button mb-4 text-accent"><i class="fas fa-arrow-left mr-2"></i> Back to Home</button><h2 class="text-2xl font-bold mb-4 section-title">All Artists Entries</h2><div class="search-container mb-4"><i class="fas fa-search search-icon"></i><input type="text" id="artistSearch" class="search-input text-sm" placeholder="Search artists..."></div><div id="artistsGrid" class="artists-icons-grid">${artists.map(a=>`<div class="artist-icon-card" data-artist="${a}"><div class="artist-icon-placeholder" id="icon-${a.replace(/[^a-z0-9]/gi,'_')}"><i class="fas fa-user"></i></div><div class="artist-icon-name">${a}</div></div>`).join('')}</div></div>`; document.getElementById('backBtn')?.addEventListener('click',navigateBack); document.getElementById('artistSearch').addEventListener('input',function(){ let term=this.value.toLowerCase(); let filtered=artists.filter(a=>a.toLowerCase().includes(term)); document.getElementById('artistsGrid').innerHTML=filtered.map(a=>`<div class="artist-icon-card" data-artist="${a}"><div class="artist-icon-placeholder" id="icon-${a.replace(/[^a-z0-9]/gi,'_')}"><i class="fas fa-user"></i></div><div class="artist-icon-name">${a}</div></div>`).join(''); attachArtistClicks(); loadArtistIcons(filtered); }); attachArtistClicks(); loadArtistIcons(artists); setupBackToTop(); }
        function attachArtistClicks(){ document.querySelectorAll('.artist-icon-card').forEach(c=>c.addEventListener('click',()=>renderArtistPage(c.dataset.artist))); }
        async function loadArtistIcons(artists){ for(let a of artists){ let url = await getSpotifyImage(a,'artist'); let el = document.getElementById(`icon-${a.replace(/[^a-z0-9]/gi,'_')}`); if(el && url){ el.innerHTML=`<img src="${url}" class="artist-icon-image">`; el.classList.remove('artist-icon-placeholder'); } } }
        function navigateBack(){ let prev = appState.navigationHistory.pop(); if(prev?.view==='chart') showChart(prev.chart); else if(prev?.view==='artist') renderArtistPage(prev.artist); else if(prev?.view==='allArtists') showAllArtists(); else if(prev?.view==='chartBeat') renderChartBeatPage(); else renderHome(); }
        function renderHome(){ appState.currentView='home'; const h100=appState.chartBeatData.hot100[0], a50=appState.chartBeatData.artists[0], a100=appState.chartBeatData.top100Albums[0]; const firstRowCharts = weeklyChartList.slice(0,4); const secondRowCharts = weeklyChartList.slice(4,8); appContainer.innerHTML = `<div class="max-w-7xl mx-auto"><div class="text-center mb-8 md:mb-12"><h2 class="text-3xl md:text-4xl font-bold mb-4 text-white">daegon charts</h2><p class="text-gray-400 text-sm md:text-base">Your personal charts based on Last.fm data. Track your most played songs, artists, and albums.</p></div><div class="circle-cards-grid mb-12 md:mb-16">${firstRowCharts.map(c=>`<div class="circle-card-container" data-chart="${c}"><div class="circle-card" id="circle-${c}"><div class="w-full h-full placeholder-art"><i class="fas ${chartsConfig[c]?.icon} text-2xl md:text-3xl text-gray-600"></i></div><div class="circle-card-content"><h3 class="circle-card-title">${chartsConfig[c]?.title}</h3></div></div><div class="circle-card-label text-xs md:text-sm">${chartsConfig[c]?.title}</div></div>`).join('')}</div><div class="circle-cards-grid mb-12 md:mb-16">${secondRowCharts.map(c=>`<div class="circle-card-container" data-chart="${c}"><div class="circle-card" id="circle-${c}"><div class="w-full h-full placeholder-art"><i class="fas ${chartsConfig[c]?.icon} text-2xl md:text-3xl text-gray-600"></i></div><div class="circle-card-content"><h3 class="circle-card-title">${chartsConfig[c]?.title}</h3></div></div><div class="circle-card-label text-xs md:text-sm">${chartsConfig[c]?.title}</div></div>`).join('')}</div>${(h100||a50||a100)?`<div class="mb-12 md:mb-16"><h3 class="text-xl md:text-2xl font-bold mb-6 section-title text-white">Chart Beat - Latest News</h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">${h100?`<div class="blog-card cursor-pointer" onclick="showChartBeat('hot100')"><img src="${h100.imageUrl||'https://via.placeholder.com/400x200?text=No+Image'}" class="w-full h-40 md:h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'"><div class="p-3"><span class="text-xs text-accent font-semibold">${h100.publicationDate}</span><h4 class="font-bold text-sm md:text-lg mt-1 text-white line-clamp-2">${h100.title}</h4></div></div>`:''}${a50?`<div class="blog-card cursor-pointer" onclick="showChartBeat('artists')"><img src="${a50.imageUrl||'https://via.placeholder.com/400x200?text=No+Image'}" class="w-full h-40 md:h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'"><div class="p-3"><span class="text-xs text-accent font-semibold">${a50.publicationDate}</span><h4 class="font-bold text-sm md:text-lg mt-1 text-white line-clamp-2">${a50.title}</h4></div></div>`:''}${a100?`<div class="blog-card cursor-pointer" onclick="showChartBeat('top100Albums')"><img src="${a100.imageUrl||'https://via.placeholder.com/400x200?text=No+Image'}" class="w-full h-40 md:h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'"><div class="p-3"><span class="text-xs text-accent font-semibold">${a100.publicationDate}</span><h4 class="font-bold text-sm md:text-lg mt-1 text-white line-clamp-2">${a100.title}</h4></div></div>`:''}</div></div>`:''}<div class="mb-12 md:mb-16"><h3 class="text-xl md:text-2xl font-bold mb-6 section-title text-white">Weekly Charts</h3><div id="weeklyChartsGrid" class="weekly-charts-grid">${weeklyChartList.map(c=>renderChartCard(c, chartsConfig[c]?.title)).join('')}</div></div><div class="mb-12 md:mb-16"><h3 class="text-xl md:text-2xl font-bold mb-6 section-title text-white">Year-End Charts</h3><div id="yearEndChartsGrid" class="weekly-charts-grid">${yearEndList.map(c=>renderChartCard(c, chartsConfig[c]?.title)).join('')}</div></div><div class="mb-12 md:mb-16"><h3 class="text-xl md:text-2xl font-bold mb-6 section-title goat-title text-white">Greatest of All Time</h3><div id="goatChartsGrid" class="weekly-charts-grid">${goatList.map(c=>renderChartCard(c, chartsConfig[c]?.title)).join('')}</div></div></div>`; document.querySelectorAll('.chart-card, .circle-card-container').forEach(el=>el.addEventListener('click',()=>showChart(el.dataset.chart))); setTimeout(()=>loadCircleImages(),100); setupBackToTop(); }
        function renderChartCard(ct, title){ const top = appState.top3Data[ct] || []; const isGoat = ct.includes('goat'); if (!top.length) return `<div class="chart-card cursor-pointer transition-all duration-300 hover:border-accent shadow-sm ${isGoat ? 'hover:border-gold goat-card-border' : ''}" data-chart="${ct}"><div class="flex items-center justify-between mb-2 md:mb-3"><h4 class="font-semibold text-sm md:text-base text-white">${title}</h4><span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded-full">Loading...</span></div><div class="loading-skeleton h-24"></div></div>`; return `<div class="chart-card cursor-pointer transition-all duration-300 hover:border-accent shadow-sm ${isGoat ? 'hover:border-gold goat-card-border' : ''}" data-chart="${ct}"><div class="flex items-center justify-between mb-2 md:mb-3"><h4 class="font-semibold text-sm md:text-base text-white">${title}</h4><span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded-full">Top ${top.length}</span></div><div class="space-y-1 md:space-y-2">${top.map((item, i) => `<div class="flex items-center text-xs md:text-sm text-gray-300"><span class="font-bold w-5 md:w-6 ${i===0?'text-accent':'text-gray-400'} ${isGoat && i===0 ? 'goat-text' : ''}">${item.position}</span><span class="truncate break-text">${item.name || 'Unknown'}</span></div>`).join('')}</div></div>`; }
        async function loadCircleImages() { for(let ct of weeklyChartList) { let top = appState.top3Data[ct]?.[0]; if(!top) continue; let q='', t=''; if(ct==='songs'||ct==='radioSongs'||ct==='streamingSongs'||ct==='digitalSongsSales'){ q=top.artist; t='artist'; } else if(ct==='albums'||ct==='topStreamingAlbums'||ct==='topAlbumSales'){ let a=top.name?.includes('(')?top.name.substring(0,top.name.indexOf('(')).trim():top.name; q=`${top.artist} ${a}`; t='album'; } else{ q=top.name; t='artist'; } if(q && q!=='Unknown'){ let url=await getSpotifyImage(q,t); let el=document.getElementById(`circle-${ct}`); if(el&&url){ el.innerHTML=`<img src="${url}" class="w-full h-full object-cover">`; el.classList.remove('placeholder-art'); } } } }
        function showChartBeat(blog){ appState.currentBlog=blog; appState.activeTag=null; appState.currentView='chartBeat'; renderChartBeatPage(); }
        function renderChartBeatPage(){ let arts = appState.chartBeatData[appState.currentBlog]||[]; const allTags = new Set(); arts.forEach(a=>{ if(a.artist) allTags.add(`#${a.artist.toLowerCase()}`); }); if(appState.activeTag) arts = arts.filter(a=>a.artist && `#${a.artist.toLowerCase()}`===appState.activeTag); appContainer.innerHTML = `<div class="max-w-6xl mx-auto"><button id="backBtn" class="back-button mb-4 md:mb-6 flex items-center text-accent hover:text-accent-dark font-semibold transition-colors text-sm md:text-base"><i class="fas fa-arrow-left mr-2"></i> Back to Home</button><div class="text-center mb-6 md:mb-8"><h2 class="text-2xl md:text-3xl font-bold mb-2 text-white">Chart Beat</h2><p class="text-gray-400 text-sm md:text-base">News and insights about the music charts</p></div><div class="flex justify-center mb-6 md:mb-8 border-b border-gray-800 overflow-x-auto pb-1"><button class="chart-beat-nav-btn px-3 md:px-4 py-2 text-sm md:text-base font-medium whitespace-nowrap ${appState.currentBlog==='hot100'?'active':''}" data-blog="hot100">Hot 100 Songs</button><button class="chart-beat-nav-btn px-3 md:px-4 py-2 text-sm md:text-base font-medium whitespace-nowrap ${appState.currentBlog==='artists'?'active':''}" data-blog="artists">Top 50 Artists</button><button class="chart-beat-nav-btn px-3 md:px-4 py-2 text-sm md:text-base font-medium whitespace-nowrap ${appState.currentBlog==='top100Albums'?'active':''}" data-blog="top100Albums">Top 100 Albums</button></div>${allTags.size?`<div class="filter-bar"><span class="text-sm text-gray-300"><i class="fas fa-tags mr-1"></i> Filter by artist:</span><div class="flex flex-wrap gap-2">${Array.from(allTags).map(t=>`<span class="tag ${appState.activeTag===t?'active':''}" data-tag="${t}">${t}</span>`).join('')}</div>${appState.activeTag?`<span class="clear-filter"><i class="fas fa-times mr-1"></i>Clear filter</span>`:''}</div>`:''}<div><h3 class="text-lg md:text-xl font-bold mb-4 md:mb-6 section-title text-white">All Articles</h3><div class="space-y-4 md:space-y-6">${arts.length?arts.map((a,i)=>`<div class="blog-card bg-black rounded-lg border border-gray-800 p-3 md:p-4 shadow-sm"><div class="flex flex-col sm:flex-row"><div class="sm:w-1/4 mb-3 sm:mb-0"><img src="${a.imageUrl||'https://via.placeholder.com/400x200?text=No+Image'}" class="w-full h-24 sm:h-32 object-cover rounded" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'"></div><div class="sm:w-3/4 sm:pl-4 md:pl-6"><span class="text-xs text-accent font-semibold">${a.publicationDate}</span><h4 class="font-bold text-base md:text-lg mt-1 mb-2 text-white break-text">${a.title}</h4><p class="text-gray-400 text-xs md:text-sm line-clamp-3">${a.fullText.substring(0,150)}...</p><div class="tag-container mt-2">${a.artist?`<span class="tag" data-tag="#${a.artist.toLowerCase()}">#${a.artist.toLowerCase()}</span>`:''}</div><button class="read-more-btn mt-2 md:mt-3 text-accent text-xs md:text-sm font-semibold" data-blog="${appState.currentBlog}" data-idx="${i}">Read More <i class="fas fa-arrow-right ml-1 text-xs"></i></button></div></div></div>`).join(''):`<div class="text-center py-6 md:py-8 text-gray-400"><i class="fas fa-newspaper text-3xl md:text-4xl mb-3"></i><p class="text-sm md:text-base">No articles available</p></div>`}</div></div></div>`; document.getElementById('backBtn')?.addEventListener('click',()=>navigateBack()); document.querySelectorAll('.chart-beat-nav-btn').forEach(b=>b.addEventListener('click',()=>{ appState.currentBlog=b.dataset.blog; appState.activeTag=null; renderChartBeatPage(); })); document.querySelectorAll('.tag').forEach(t=>t.addEventListener('click',(e)=>{ e.stopPropagation(); appState.activeTag=t.dataset.tag; renderChartBeatPage(); })); document.querySelector('.clear-filter')?.addEventListener('click',()=>{ appState.activeTag=null; renderChartBeatPage(); }); document.querySelectorAll('.read-more-btn').forEach(b=>b.addEventListener('click',()=>renderArticleModal(b.dataset.blog,parseInt(b.datase         function renderArticleModal(blog,idx){ const art = appState.chartBeatData[blog]?.[idx]; if(!art) return; let txt = art.fullText; txt = txt.replace(/\b(\w+'\w+)\b/g,'<strong>$1</strong>').replace(/\b(\d+)\b/g,'<em>$1</em>').replace(/\b(\w+(?:\s+\w+)*)\s+by\s+(\w+(?:\s+\w+)*)\b/gi,'<strong>$1</strong> by <strong>$2</strong>'); modalContent.innerHTML = `<div><div class="mb-4"><img src="${art.imageUrl||'https://via.placeholder.com/800x400?text=No+Image'}" class="w-full h-48 md:h-64 object-cover rounded-lg mb-4" onerror="this.src='https://via.placeholder.com/800x400?text=No+Image'"><span class="text-xs md:text-sm text-accent font-semibold">${art.publicationDate}</span><h3 class="text-xl md:text-2xl font-bold mt-1 mb-3 text-black break-text">${art.title}</h3><p class="text-gray-800 text-sm md:text-base whitespace-pre-line" style="text-align:justify">${txt}</p>${art.artist?`<div class="mt-4 flex flex-wrap gap-2"><span class="tag" data-tag="#${art.artist.toLowerCase()}">#${art.artist.toLowerCase()}</span></div>`:''}${art.chartLink?`<div class="mt-6 md:mt-8 text-center"><button class="px-3 md:px-4 py-2 bg-accent text-black rounded-md hover:bg-accent-dark transition-colors text-sm md:text-base" onclick="showChart('${art.chartLink}','${art.publicationDate}')">See the full chart <i class="fas fa-arrow-right ml-2"></i></button></div>`:''}</div></div>`; modal.classList.add('active'); document.querySelectorAll('.tag').forEach(t=>t.addEventListener('click',(e)=>{ e.stopPropagation(); modal.classList.remove('active'); appState.activeTag=t.dataset.tag; renderChartBeatPage(); })); }
        function setupBackToTop(){ let existing = document.querySelector('.back-to-top'); if(existing) existing.remove(); let btn = document.createElement('button'); btn.className='back-to-top'; btn.innerHTML='<i class="fas fa-arrow-up"></i>'; document.body.appendChild(btn); window.addEventListener('scroll',()=>{ if(window.scrollY>300){ btn.style.display='flex'; setTimeout(()=>btn.classList.add('visible'),10); } else{ btn.classList.remove('visible'); setTimeout(()=>{if(!btn.classList.contains('visible')) btn.style.display='none';},300); } }); btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'})); }
        async function init(){ showMessage('loading','Loading charts...'); try{ const priorityCharts = [...weeklyChartList]; await Promise.all(priorityCharts.map(ct => fetchChartData(ct))); for(let ct of weeklyChartList) { let dates = Object.keys(appState.chartData[ct]||{}); if(dates.length) { appState.sharedDate = dates[dates.length-1]; break; } } renderHome(); const backgroundCharts = [...yearEndList, ...goatList, 'artistStats']; backgroundCharts.forEach(ct => { fetchChartData(ct).then(() => { if (ct.includes('yearEnd') || ct.includes('goat')) updateHomeCharts(); if (ct === 'artistStats') { if (appState.currentView === 'allArtists') showAllArtists(); } }); }); setTimeout(() => fetchChartBeat(), 500); } catch(e){ console.error(e); showMessage('error','Error loading data: '+e.message); } }
        function updateHomeCharts() { const weeklyGrid = document.getElementById('weeklyChartsGrid'); const yearEndGrid = document.getElementById('yearEndChartsGrid'); const goatGrid = document.getElementById('goatChartsGrid'); if (weeklyGrid) weeklyGrid.innerHTML = weeklyChartList.map(c=>renderChartCard(c, chartsConfig[c]?.title)).join(''); if (yearEndGrid) yearEndGrid.innerHTML = yearEndList.map(c=>renderChartCard(c, chartsConfig[c]?.title)).join(''); if (goatGrid) goatGrid.innerHTML = goatList.map(c=>renderChartCard(c, chartsConfig[c]?.title)).join(''); document.querySelectorAll('.chart-card').forEach(el=>el.addEventListener('click',()=>showChart(el.dataset.chart))); }
        function showMessage(type, text) { appContainer.innerHTML = type==='loading'?`<div class="flex flex-col items-center justify-center p-8"><div class="loader mb-4"></div><p class="text-gray-400">${text}</p></div>`:`<div class="flex flex-col items-center justify-center p-8"><i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i><p class="text-center text-red-500">${text}</p><button id="retryBtn" class="mt-4 px-4 py-2 bg-accent text-black rounded-md">Try Again</button></div>`; document.getElementById('retryBtn')?.addEventListener('click', init); }
        document.addEventListener('DOMContentLoaded',()=>{ init(); document.getElementById('mainTitle').addEventListener('click',()=>{ appState.navigationHistory=[]; renderHome(); }); document.getElementById('navAllArtists').addEventListener('click',()=>showAllArtists()); document.getElementById('navChartBeat').addEventListener('click',()=>showChartBeat('hot100')); closeModal.addEventListener('click',()=>modal.classList.remove('active')); modal.addEventListener('click',e=>{ if(e.target===modal) modal.classList.remove('active'); }); window.showChart = showChart; window.goToWeek = goToWeek; window.showChartBeat = showChartBeat; });
