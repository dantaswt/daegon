        const appContainer = document.getElementById('app'), modal = document.getElementById('itemDetailsModal'), modalContent = document.getElementById('modalContent'), closeModal = document.getElementById('closeModal');

        async function getSpotifyToken() { if (SPOTIFY_ACCESS_TOKEN) return SPOTIFY_ACCESS_TOKEN; try { const res = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Basic ' + btoa(SPOTIFY_CLIENT_ID + ':' + SPOTIFY_CLIENT_SECRET) }, body: 'grant_type=client_credentials' }); const data = await res.json(); SPOTIFY_ACCESS_TOKEN = data.access_token; return SPOTIFY_ACCESS_TOKEN; } catch(e) { return null; } }

        function parseCsvRow(t) { if(!t) return []; let r=[], c='', q=false; for(let i=0;i<t.length;i++){ const ch=t[i]; if(ch==='"') q=!q; else if(ch===','&&!q){ r.push(c.trim()); c=''; } else c+=ch; } r.push(c.trim()); return r; }

        function attachArtistClicks(){ document.querySelectorAll('.artist-icon-card').forEach(c=>c.addEventListener('click',()=>renderArtistPage(c.dataset.artist))); }
        function navigateBack(){ let prev = appState.navigationHistory.pop(); if(prev?.view==='chart') showChart(prev.chart); else if(prev?.view==='artist') renderArtistPage(prev.artist); else if(prev?.view==='allArtists') showAllArtists(); else if(prev?.view==='chartBeat') renderChartBeatPage(); else renderHome(); }
        function setupBackToTop(){ let existing = document.querySelector('.back-to-top'); if(existing) existing.remove(); let btn = document.createElement('button'); btn.className='back-to-top'; btn.innerHTML='<i class="fas fa-arrow-up"></i>'; document.body.appendChild(btn); window.addEventListener('scroll',()=>{ if(window.scrollY>300){ btn.style.display='flex'; setTimeout(()=>btn.classList.add('visible'),10); } else{ btn.classList.remove('visible'); setTimeout(()=>{if(!btn.classList.contains('visible')) btn.style.display='none';},300); } }); btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'})); }
        async function fetchChartBeat() { for(let [key, cfg] of Object.entries(chartBeatConfig)) { try { const res = await fetch(cfg.url); let csv = await res.text(); if(csv.charCodeAt(0)===0xFEFF) csv=csv.substring(1); const rows = csv.trim().split('\n').map(r=>parseCsvRow(r)); const header = rows[0].map(h=>h.toLowerCase().trim()); const find = (ks)=>{ for(let k of ks){ let i=header.indexOf(k); if(i!==-1) return i; } return -1; }; const di = find(['date','data']), ti = find(['title','título']), xi = find(['text','conteúdo']), ai = find(['artist','artista']), li = find(['chartlink']); const processed = rows.slice(1).map(r=>({ title: r[ti]||'NO TITLE', publicationDate: r[di]||'NO DATE', artist: r[ai]||null, fullText: r[xi]||'No content available.', chartLink: r[li]||null, imageUrl: null })).reverse(); appState.chartBeatData[key] = processed; setTimeout(async () => { for(let i=0;i<processed.length;i++) { if(processed[i].artist) { const url = await getSpotifyImage(processed[i].artist, 'artist'); if(url) processed[i].imageUrl = url; } } }, 100); } catch(e) { appState.chartBeatData[key]=[]; } } }
        function renderChartBeatPage(){ let arts = appState.chartBeatData[appState.currentBlog]||[]; appContainer.innerHTML = `<div class="max-w-6xl mx-auto"><button id="backBtn" class="back-button mb-4 text-accent"><i class="fas fa-arrow-left mr-2"></i> Back</button><div class="text-center mb-6"><h2 class="text-2xl font-bold">Chart Beat</h2></div><div class="flex justify-center gap-4 border-b pb-2"><button class="chart-beat-nav-btn ${appState.currentBlog==='hot100'?'active':''}" data-blog="hot100">Hot 100</button><button class="chart-beat-nav-btn ${appState.currentBlog==='artists'?'active':''}" data-blog="artists">Artists</button><button class="chart-beat-nav-btn ${appState.currentBlog==='top100Albums'?'active':''}" data-blog="top100Albums">Albums</button></div><div class="mt-6 space-y-4">${arts.map(a=>`<div class="blog-card p-4"><img src="${a.imageUrl||'https://via.placeholder.com/400x200'}" class="rounded"><h4 class="font-bold mt-2">${a.title}</h4><p class="text-sm text-gray-400">${a.publicationDate}</p><button class="read-more-btn mt-2 text-accent" data-blog="${appState.currentBlog}" data-idx="${arts.indexOf(a)}">Read More</button></div>`).join('')}</div></div>`; document.getElementById('backBtn')?.addEventListener('click',navigateBack); document.querySelectorAll('.chart-beat-nav-btn').forEach(b=>b.addEventListener('click',()=>{ appState.currentBlog=b.dataset.blog; renderChartBeatPage(); })); document.querySelectorAll('.read-more-btn').forEach(b=>b.addEventListener('click',()=>{ let art = appState.chartBeatData[b.dataset.blog][parseInt(b.dataset.idx)]; modalContent.innerHTML = `<div><h3 class="text-xl font-bold">${art.title}</h3><p class="text-gray-500 text-sm">${art.publicationDate}</p><p class="mt-2">${art.fullText}</p>${art.chartLink?`<button class="mt-4 bg-accent text-black px-4 py-2 rounded" onclick="showChart('${art.chartLink}')">View Chart</button>`:''}</div>`; modal.classList.add('active'); })); setupBackToTop(); }
        async function init(){ showMessage('loading','Loading charts...'); try{ const priorityCharts = [...weeklyChartList]; await Promise.all(priorityCharts.map(ct => fetchChartData(ct))); for(let ct of weeklyChartList) { let dates = Object.keys(appState.chartData[ct]||{}); if(dates.length) { appState.sharedDate = dates[dates.length-1]; break; } } renderHome(); const backgroundCharts = [...yearEndList, ...goatList, 'artistStats']; backgroundCharts.forEach(ct => { fetchChartData(ct).then(() => { if (ct.includes('yearEnd') || ct.includes('goat')) { document.querySelectorAll('.chart-card').forEach(el=>el.remove()); renderHome(); } if (ct === 'artistStats' && appState.currentView === 'allArtists') showAllArtists(); }); }); setTimeout(() => fetchChartBeat(), 500); } catch(e){ showMessage('error','Error loading data'); } }
        function showMessage(type, text) { appContainer.innerHTML = type==='loading'?`<div class="flex flex-col items-center p-8"><div class="loader"></div><p>${text}</p></div>`:`<div class="text-center p-8 text-red-500">${text}<button id="retryBtn" class="mt-4 bg-accent px-4 py-2 rounded">Retry</button></div>`; document.getElementById('retryBtn')?.addEventListener('click', init); }
        document.addEventListener('DOMContentLoaded',()=>{ init(); document.getElementById('mainTitle').addEventListener('click',()=>{ appState.navigationHistory=[]; renderHome(); }); document.getElementById('navAllArtists').addEventListener('click',()=>showAllArtists()); document.getElementById('navChartBeat').addEventListener('click',()=>{ appState.currentBlog='hot100'; renderChartBeatPage(); }); closeModal.addEventListener('click',()=>modal.classList.remove('active')); modal.addEventListener('click',e=>{ if(e.target===modal) modal.classList.remove('active'); }); window.goToWeek = function(ct,date){ appState.currentDate=date; showChart(ct,date); modal.classList.remove('active'); }; window.showChart = showChart; });
    </script>
</body>
</html>
